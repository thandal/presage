name: Build
on:
  push:
    branches:
      - main
    tags:
      - v0.*
  pull_request:

env:
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: cargo ${{ matrix.cargo_flags }}
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
      # sqlx query! macros validate against this DB at compile time
      # (the offline .sqlx cache is gitignored, not committed)
      DATABASE_URL: sqlite:/tmp/presage-ci.db3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install protobuf
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Create sqlx dev database
        run: cat presage-store-sqlite/migrations/*.sql | sqlite3 /tmp/presage-ci.db3

      - name: Configure CI cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets --all-features

      - name: Test
        run: cargo test --all-targets --all-features

      - name: Test docs
        run: cargo test --doc --all-features

  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check code format
        run: cargo fmt -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    env:
      # sqlx query! macros validate against this DB at compile time
      # (the offline .sqlx cache is gitignored, not committed)
      DATABASE_URL: sqlite:/tmp/presage-ci.db3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Install protobuf
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Create sqlx dev database
        run: cat presage-store-sqlite/migrations/*.sql | sqlite3 /tmp/presage-ci.db3

      - name: Setup CI cache
        uses: Swatinem/rust-cache@v2

      - name: Run clippy lints
        run: cargo clippy
